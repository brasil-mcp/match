name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: client (src/ - MIT, published)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python }}
      - name: Install
        run: uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Pyright
        run: uv run pyright src
      - name: Tests + coverage (>=95%)
        run: uv run pytest --cov=brasil_mcp_match --cov-branch --cov-report=term-missing --cov-fail-under=95

  server:
    name: server (server/ - AGPL, self-host)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        # Kept for future native-Postgres integration tests; current suite uses
        # testcontainers and brings up its own postgres.
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brasil_mcp_match_test
          POSTGRES_USER: brasilmcp
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brasilmcp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python }}
      - name: Install
        run: uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Pyright
        run: uv run pyright src
      - name: Tests
        env:
          BRASIL_MCP_MATCH_DATABASE_URL: postgresql://brasilmcp:test_password@localhost:5432/brasil_mcp_match_test
        run: uv run pytest -q
