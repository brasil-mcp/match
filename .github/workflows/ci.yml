name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        # Preparatory: current tests are fully mocked and don't actually
        # exercise this service. Kept here so that future integration tests
        # (psycopg COPY against real Postgres) can land without re-wiring CI.
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brasil_mcp_match_test
          POSTGRES_USER: brasilmcp
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brasilmcp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps (frozen, all extras)
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Pyright type-check
        run: uv run pyright src

      - name: Pytest + coverage (100% gate)
        env:
          BRASIL_MCP_MATCH_DATABASE_URL: postgresql://brasilmcp:test_password@localhost:5432/brasil_mcp_match_test
        run: |
          uv run pytest \
            --cov=brasil_mcp_match \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
