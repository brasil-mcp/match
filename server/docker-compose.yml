services:
  postgres:
    image: postgres:16-alpine
    container_name: brasil-mcp-match-postgres
    environment:
      POSTGRES_DB: brasil_mcp_match
      POSTGRES_USER: brasilmcp
      POSTGRES_PASSWORD: dev_password_only
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./src/brasil_mcp_match_server/core/ingestion/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brasilmcp"]
      interval: 5s
      timeout: 3s
      retries: 5
